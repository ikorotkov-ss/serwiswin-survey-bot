---
- name: Deploy SerwisWin Survey Bot
  hosts: all
  become: yes
  vars:
    repo_url: "https://github.com/ikorotkov-ss/serwiswin-survey-bot.git"
    bot_dir: /opt/survey-bot
    whisper_model: ggml-small.bin
    whisper_model_url: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin"
    bot_user: surveybot

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system packages
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - git
          - ffmpeg
          - build-essential
        state: present

    - name: Create bot user
      user:
        name: "{{ bot_user }}"
        system: yes
        home: "{{ bot_dir }}"
        shell: /usr/sbin/nologin
        create_home: no

    - name: Create bot directory
      file:
        path: "{{ bot_dir }}"
        state: directory
        owner: "{{ bot_user }}"
        group: "{{ bot_user }}"
        mode: 0755

    - name: Clone repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ bot_dir }}"
        version: main
        force: yes

    - name: Create models directory
      file:
        path: "{{ bot_dir }}/models"
        state: directory
        owner: "{{ bot_user }}"
        group: "{{ bot_user }}"
        mode: 0755

    - name: Create audio directory
      file:
        path: "{{ bot_dir }}/audio"
        state: directory
        owner: "{{ bot_user }}"
        group: "{{ bot_user }}"
        mode: 0755

    - name: Download whisper model (465MB)
      get_url:
        url: "{{ whisper_model_url }}"
        dest: "{{ bot_dir }}/models/{{ whisper_model }}"
        owner: "{{ bot_user }}"
        group: "{{ bot_user }}"
        mode: 0644
      timeout: 600

    - name: Install whisper-cli
      shell: |
        cd /tmp
        git clone https://github.com/ggerganov/whisper.cpp.git
        cd whisper.cpp
        make -j$(nproc)
        cp whisper-cli /usr/local/bin/whisper-cli
        chmod +x /usr/local/bin/whisper-cli
        rm -rf /tmp/whisper.cpp
      args:
        creates: /usr/local/bin/whisper-cli

    - name: Install Python dependencies
      pip:
        requirements: "{{ bot_dir }}/requirements.txt"
        executable: pip3

    - name: Create .env file
      copy:
        dest: "{{ bot_dir }}/.env"
        content: |
          BOT_TOKEN={{ bot_token }}
          ADMIN_IDS={{ admin_ids }}
        owner: "{{ bot_user }}"
        group: "{{ bot_user }}"
        mode: 0600
      no_log: yes

    - name: Create database directory (writable)
      file:
        path: "{{ bot_dir }}"
        owner: "{{ bot_user }}"
        group: "{{ bot_user }}"
        recurse: yes

    - name: Install systemd service
      template:
        src: survey-bot.service.j2
        dest: /etc/systemd/system/survey-bot.service
        mode: 0644

    - name: Enable and start service
      systemd:
        name: survey-bot
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Setup daily DB backup cron
      cron:
        name: survey-bot db backup
        minute: "3"
        hour: "4"
        job: "cp {{ bot_dir }}/survey.db {{ bot_dir }}/backups/survey_$(date +\\%Y\\%m\\%d).db"
        state: present

    - name: Create backups directory
      file:
        path: "{{ bot_dir }}/backups"
        state: directory
        owner: "{{ bot_user }}"
        group: "{{ bot_user }}"
        mode: 0755
